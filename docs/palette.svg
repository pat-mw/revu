<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" role="img" aria-label="revu palette — six hexes carry the whole app">
  <defs>
    <style>
      .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; }
      .sans { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="150" rx="12" fill="#151613"/>
  <rect x="0.5" y="0.5" width="1199" height="149" rx="11.5" fill="none" stroke="#2E312B"/>

  <!-- canvas -->
  <g>
    <rect x="46" y="32" width="160" height="44" rx="6" fill="#1B1D19" stroke="#3C4038"/>
    <text x="126" y="59" text-anchor="middle" class="mono" font-size="13" fill="#96948A">#151613</text>
    <text x="126" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">canvas</text>
    <text x="126" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">warm near-black</text>
  </g>
  <!-- ink -->
  <g>
    <rect x="238" y="32" width="160" height="44" rx="6" fill="#D9D7CD"/>
    <text x="318" y="59" text-anchor="middle" class="mono" font-size="13" fill="#151613">#D9D7CD</text>
    <text x="318" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">ink</text>
    <text x="318" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">text</text>
  </g>
  <!-- add -->
  <g>
    <rect x="430" y="32" width="160" height="44" rx="6" fill="#4CC8A8"/>
    <text x="510" y="59" text-anchor="middle" class="mono" font-size="13" fill="#151613">#4CC8A8</text>
    <text x="510" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">add</text>
    <text x="510" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">diff only</text>
  </g>
  <!-- del -->
  <g>
    <rect x="622" y="32" width="160" height="44" rx="6" fill="#E5885E"/>
    <text x="702" y="59" text-anchor="middle" class="mono" font-size="13" fill="#151613">#E5885E</text>
    <text x="702" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">del</text>
    <text x="702" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">diff only</text>
  </g>
  <!-- draft -->
  <g>
    <rect x="814" y="32" width="160" height="44" rx="6" fill="#A48FFF"/>
    <text x="894" y="59" text-anchor="middle" class="mono" font-size="13" fill="#151613">#A48FFF</text>
    <text x="894" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">draft</text>
    <text x="894" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">your unsent work</text>
  </g>
  <!-- stale -->
  <g>
    <rect x="1006" y="32" width="160" height="44" rx="6" fill="#D9B44A"/>
    <text x="1086" y="59" text-anchor="middle" class="mono" font-size="13" fill="#151613">#D9B44A</text>
    <text x="1086" y="102" text-anchor="middle" class="sans" font-size="13" fill="#96948A">stale</text>
    <text x="1086" y="122" text-anchor="middle" class="sans" font-size="11.5" fill="#6B6A61">time moved</text>
  </g>
</svg>
