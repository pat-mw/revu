name: check

# Runs the same gate as `bun run check` (oxlint + tsc -b + bun test + vite build)
# on every pull request and on pushes to main. Public repo → free runners.
on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs for the same ref so only the latest commit is checked.
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Gate (oxlint + tsc -b + bun test + vite build)
        run: bun run check
