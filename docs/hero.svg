<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="revu — code review for people GitHub can't see">
  <defs>
    <style>
      .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; }
      .sans { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="360" rx="12" fill="#151613"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="11.5" fill="none" stroke="#2E312B"/>

  <!-- wordmark -->
  <text x="80" y="118" class="sans" font-size="64" font-weight="700" fill="#D9D7CD" letter-spacing="-2">revu</text>
  <circle cx="228" cy="98" r="7" fill="#A48FFF"/>

  <!-- tagline -->
  <text x="80" y="162" class="sans" font-size="21" fill="#96948A">Code review for people GitHub can’t see.</text>
  <text x="80" y="192" class="mono" font-size="13.5" fill="#6B6A61">every contractor is  acme-broker[bot] · drafts live on the broker · a PR is a snapshot</text>

  <!-- the snapshot seal, in its stale state -->
  <g>
    <rect x="80" y="232" width="336" height="34" rx="6" fill="rgba(217,180,74,0.12)" stroke="rgba(217,180,74,0.45)"/>
    <text x="98" y="254" class="mono" font-size="14" fill="#D9B44A">⧗ 3 new commits since sync</text>
    <rect x="330" y="238" width="74" height="22" rx="4" fill="#22241F" stroke="#3C4038"/>
    <text x="342" y="253.5" class="sans" font-size="12.5" fill="#D9D7CD">Re-sync</text>
  </g>
  <text x="80" y="296" class="mono" font-size="12.5" fill="#6B6A61">the offline-first contract, made visible — quiet when fresh, gold when the world moved</text>

  <!-- mini diff panel -->
  <g>
    <rect x="700" y="56" width="420" height="248" rx="8" fill="#1B1D19" stroke="#2E312B"/>
    <text x="722" y="86" class="mono" font-size="12" fill="#6B6A61">src/auth/refresh-scheduler.ts</text>
    <line x1="700.5" y1="100" x2="1119.5" y2="100" stroke="#2E312B"/>

    <!-- hunk header -->
    <rect x="701" y="106" width="418" height="24" fill="#1E211C"/>
    <text x="722" y="122" class="mono" font-size="12.5" fill="#6B6A61">@@ -2,20 +2,69 @@</text>

    <!-- context line -->
    <text x="722" y="150" class="mono" font-size="13" fill="#96948A"><tspan fill="#6B6A61">5   </tspan>  /**</text>

    <!-- deletion -->
    <rect x="701" y="158" width="418" height="24" fill="rgba(229,136,94,0.09)"/>
    <rect x="820" y="161" width="62" height="18" rx="2" fill="rgba(229,136,94,0.24)"/>
    <text x="722" y="175" class="mono" font-size="13" fill="#C9C7BD"><tspan fill="#E5885E">6  −</tspan>   * <tspan>Legacy</tspan> refresh behavior</text>

    <!-- addition with word highlight -->
    <rect x="701" y="186" width="418" height="24" fill="rgba(76,200,168,0.09)"/>
    <rect x="820" y="189" width="70" height="18" rx="2" fill="rgba(76,200,168,0.26)"/>
    <text x="722" y="203" class="mono" font-size="13" fill="#C9C7BD"><tspan fill="#4CC8A8">6  +</tspan>   * <tspan>Central</tspan> refresh scheduler</text>

    <!-- pending comment card -->
    <g>
      <rect x="722" y="222" width="376" height="60" rx="6" fill="#1B1D19" stroke="#2E312B"/>
      <rect x="722" y="222" width="3" height="60" rx="1.5" fill="#A48FFF"/>
      <rect x="738" y="234" width="58" height="17" rx="3" fill="rgba(164,143,255,0.12)"/>
      <text x="746" y="246.5" class="mono" font-size="11" fill="#A48FFF">pending</text>
      <text x="804" y="246.5" class="mono" font-size="11" fill="#6B6A61">only visible to you</text>
      <text x="738" y="270" class="sans" font-size="13" fill="#96948A">Does the 90s margin hold once the fleet scales?</text>
    </g>
  </g>

  <!-- bottom strip -->
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#2E312B"/>
  <text x="80" y="342" class="mono" font-size="12" fill="#6B6A61">design prototype · mock data only · Bun + Vite + React 18</text>
  <text x="1120" y="342" text-anchor="end" class="mono" font-size="12" fill="#6B6A61">⌘K · j/k · c · ?</text>
</svg>
